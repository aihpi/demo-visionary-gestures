name: Build and Push demo-visionary-gestures Image

env:
  IMAGE: ghcr.io/aihpi/demo-visionary-gestures
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKER_BUILD_SUMMARY: false

on:
  push:
    branches:
      - main
    paths:
      - 02_backend/**
      - kubernetes/**
      - docker-compose.yml
      - .gitattributes
      - .github/workflows/publish-ui-image.yaml
  workflow_dispatch:

concurrency:
  group: demo-visionary-gestures-image-main
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./02_backend
          file: ./02_backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubernetes manifest
        id: update_manifest
        run: |
          NEW_TAG=$(echo '${{ steps.meta.outputs.json }}' | jq -r '.tags[] | select(contains("sha-"))' | cut -d':' -f2)
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

          TARGET_FILE="kubernetes/deployments.yaml"

          echo "Updating $TARGET_FILE with image tag: $NEW_TAG"

          if [ -f "$TARGET_FILE" ]; then
            sed -i "s|image: ${{ env.IMAGE }}:.*|image: ${{ env.IMAGE }}:${NEW_TAG}|g" "$TARGET_FILE"
          else
            echo "ERROR: $TARGET_FILE not found."
            exit 1
          fi

      - name: Commit and push manifest changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          TAG_NAME="${{ steps.update_manifest.outputs.tag }}"

          if git diff --exit-code kubernetes/deployments.yaml; then
            echo "No changes to manifest. Skipping commit."
          else
            git add kubernetes/deployments.yaml
            git commit -m "chore: update demo-visionary-gestures image to ${TAG_NAME} [skip ci]"
            git push origin main
          fi
