apiVersion: apps/v1
kind: Deployment
metadata:
  name: gestures
  labels:
    app: gestures
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gestures
  template:
    metadata:
      labels:
        app: gestures
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: gestures
          image: ghcr.io/aihpi/demo-visionary-gestures:sha-892fb86
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          volumeMounts:
            - name: huggingface-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: huggingface-cache
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: gestures
  labels:
    app: gestures
spec:
  type: LoadBalancer
  selector:
    app: gestures
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
      nodePort: 30805
