<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gesture Recognition</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    h1 { font-size: 1.3rem; font-weight: 600; letter-spacing: 0.5px; }

    .badge {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }
    .badge.connected    { background: #1b3a1b; color: #66bb6a; }
    .badge.disconnected { background: #3a1b1b; color: #ef5350; }
    .badge.connecting   { background: #2a2a1b; color: #ffa726; }

    .feed-wrap {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 1.5px solid #2a2a2a;
      background: #000;
      width: min(640px, 100%);
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #placeholder {
      color: #555;
      font-size: 0.85rem;
      text-align: center;
      padding: 20px;
    }

    #output {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      padding: 16px 14px 10px;
      display: none;
    }

    #prediction-text {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      width: min(640px, 100%);
    }

    button {
      padding: 8px 22px;
      border: 1.5px solid transparent;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      transition: all 0.15s;
      outline: none;
    }
    button:hover:not(:disabled) { filter: brightness(1.15); }
    button:disabled { opacity: 0.35; cursor: default; }

    .btn-mode {
      background: #1e1e1e;
      color: #bbb;
      border-color: #333;
    }
    .btn-mode.active {
      background: #1a3a5c;
      color: #64b5f6;
      border-color: #64b5f6;
    }
    .btn-mode.active.record {
      background: #3a1a1a;
      color: #ef9a9a;
      border-color: #ef5350;
    }

    .gesture-row {
      display: none;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      width: min(640px, 100%);
    }
    .gesture-row.visible { display: flex; }

    .gesture-label {
      width: 100%;
      text-align: center;
      font-size: 0.75rem;
      color: #666;
    }

    .btn-gesture {
      background: #1e1e1e;
      color: #aaa;
      border-color: #333;
      padding: 6px 14px;
      font-size: 0.82rem;
    }
    .btn-gesture.active {
      background: #2a2a1a;
      color: #fff176;
      border-color: #f9a825;
    }

    video, canvas { display: none; }
  </style>
</head>
<body>

  <header>
    <h1>✋ Gesture Recognition</h1>
    <span id="status" class="badge disconnected">Disconnected</span>
  </header>

  <div class="feed-wrap">
    <p id="placeholder">Starting camera…</p>
    <img id="output" alt="annotated video feed">
    <div class="overlay" id="overlay">
      <span id="prediction-text"></span>
    </div>
  </div>

  <div class="controls">
    <button class="btn-mode active" id="btn-normal" onclick="setMode(0)" disabled>Normal</button>
    <button class="btn-mode" id="btn-record" onclick="setMode(1)" disabled>Record</button>
  </div>

  <div class="gesture-row" id="gesture-row">
    <span class="gesture-label">Select gesture to record:</span>
    <button class="btn-gesture" onclick="setGestureClass(0)">Rock</button>
    <button class="btn-gesture" onclick="setGestureClass(1)">Paper</button>
    <button class="btn-gesture" onclick="setGestureClass(2)">Scissors</button>
    <button class="btn-gesture" onclick="setGestureClass(3)">Lizard</button>
    <button class="btn-gesture" onclick="setGestureClass(4)">Spock</button>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <script>
    const video       = document.getElementById('video');
    const canvas      = document.getElementById('canvas');
    const ctx         = canvas.getContext('2d');
    const output      = document.getElementById('output');
    const placeholder = document.getElementById('placeholder');
    const statusEl    = document.getElementById('status');
    const overlay     = document.getElementById('overlay');
    const predText    = document.getElementById('prediction-text');
    const gestureRow  = document.getElementById('gesture-row');
    const btnNormal   = document.getElementById('btn-normal');
    const btnRecord   = document.getElementById('btn-record');
    const gestureBtns = document.querySelectorAll('.btn-gesture');

    let ws            = null;
    let currentMode   = 0;
    let sending       = false;
    let captureTimer  = null;

    // ── Camera ────────────────────────────────────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' }
        });
        video.srcObject = stream;
        await new Promise(r => { video.onloadedmetadata = r; });
        video.play();
      } catch (e) {
        placeholder.textContent = 'Camera access denied. Please allow camera access and reload.';
      }
    }

    // ── WebSocket ─────────────────────────────────────────────────────────────
    function wsUrl() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const host  = location.host || 'localhost:8000';
      return `${proto}//${host}/ws`;
    }

    function connect() {
      setStatus('connecting');
      ws = new WebSocket(wsUrl());
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        setStatus('connected');
        btnNormal.disabled = false;
        btnRecord.disabled = false;
        startCapture();
      };

      ws.onclose = () => {
        setStatus('disconnected');
        btnNormal.disabled = true;
        btnRecord.disabled = true;
        stopCapture();
        setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();

      ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);

        if (msg.frame) {
          output.src = `data:image/jpeg;base64,${msg.frame}`;
          output.style.display = 'block';
          placeholder.style.display = 'none';
          overlay.style.display = 'block';
        }

        if (currentMode === 0) {
          const p = msg.prediction;
          predText.textContent = (p && p !== 'None') ? p : '';
        } else {
          predText.textContent = 'Recording…';
        }

        sending = false;
      };
    }

    // ── Frame capture ─────────────────────────────────────────────────────────
    function startCapture() {
      captureTimer = setInterval(() => {
        if (sending || !ws || ws.readyState !== WebSocket.OPEN || !video.videoWidth) return;
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        canvas.toBlob(blob => {
          if (!blob || ws.readyState !== WebSocket.OPEN) return;
          blob.arrayBuffer().then(buf => {
            sending = true;
            ws.send(buf);
          });
        }, 'image/jpeg', 0.72);
      }, 80); // ~12 fps
    }

    function stopCapture() {
      clearInterval(captureTimer);
      captureTimer = null;
    }

    // ── Controls ──────────────────────────────────────────────────────────────
    function setMode(mode) {
      currentMode = mode;
      send({ type: 'mode', value: mode });

      btnNormal.className = 'btn-mode' + (mode === 0 ? ' active' : '');
      btnRecord.className = 'btn-mode' + (mode === 1 ? ' active record' : '');
      gestureRow.className = mode === 1 ? 'gesture-row visible' : 'gesture-row';
    }

    function setGestureClass(cls) {
      send({ type: 'gesture_class', value: cls });
      gestureBtns.forEach((btn, i) => {
        btn.className = 'btn-gesture' + (i === cls ? ' active' : '');
      });
    }

    function send(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
    }

    // ── Status badge ──────────────────────────────────────────────────────────
    function setStatus(state) {
      const labels = { connected: 'Connected', disconnected: 'Disconnected', connecting: 'Connecting…' };
      statusEl.textContent = labels[state];
      statusEl.className   = `badge ${state}`;
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    startCamera().then(connect);
  </script>
</body>
</html>
